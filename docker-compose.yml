version: '3.8'

services:
  # ============ BACKEND SERVICE ============
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agenticai-backend
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/agenticai
      - REDIS_URL=redis://redis:6379
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - ENVIRONMENT=development
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173
    volumes:
      - ./backend:/app
      - /app/__pycache__
      - /app/.pytest_cache
    depends_on:
      - db
      - redis
    networks:
      - agenticai-network
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 5000 --reload

  # ============ FRONTEND SERVICE ============
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agenticai-frontend
    ports:
      - "3000:3000"
      - "5173:5173"
    environment:
      - REACT_APP_API_URL=http://localhost:5000/api
      - REACT_APP_WEBSOCKET_URL=ws://localhost:5000/ws
      - REACT_APP_ENVIRONMENT=development
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - agenticai-network
    restart: unless-stopped
    command: npm run dev -- --host 0.0.0.0

  # ============ DATABASE SERVICE ============
  db:
    image: postgres:15-alpine
    container_name: agenticai-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=agenticai
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/seed.sql
    networks:
      - agenticai-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============ REDIS SERVICE ============
  redis:
    image: redis:7-alpine
    container_name: agenticai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - agenticai-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============ NGINX SERVICE (Optional - for production) ============
  nginx:
    image: nginx:alpine
    container_name: agenticai-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
      - frontend
    networks:
      - agenticai-network
    restart: unless-stopped
    profiles:
      - production

  # ============ PGADMIN (Optional - Database GUI) ============
  pgadmin:
    image: dpage/pgadmin4
    container_name: agenticai-pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - agenticai-network
    restart: unless-stopped
    profiles:
      - devtools

# ============ VOLUMES ============
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ============ NETWORKS ============
networks:
  agenticai-network:
    driver: bridge
    name: agenticai-network

    # Use Python 3.10 slim image
FROM python:3.10-slim

# Set working directory
WORKDIR /app

# Set environment variables
ENV PYTHONDONTWRITEBYTECODE=1 \
    PYTHONUNBUFFERED=1 \
    PYTHONPATH=/app

# Install system dependencies
RUN apt-get update && apt-get install -y \
    gcc \
    postgresql-client \
    libpq-dev \
    && rm -rf /var/lib/apt/lists/*

# Copy requirements first for better caching
COPY requirements.txt .

# Install Python dependencies
RUN pip install --no-cache-dir -r requirements.txt

# Copy the rest of the application
COPY . .

# Create non-root user
RUN useradd -m -u 1000 appuser && chown -R appuser:appuser /app
USER appuser

# Expose port
EXPOSE 5000

# Run the application
CMD ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "5000"]

# Stage 1: Build
FROM node:18-alpine AS builder

WORKDIR /app

# Copy package files
COPY package*.json ./

# Install dependencies
RUN npm ci --only=production

# Copy source code
COPY . .

# Build the application
RUN npm run build

# Stage 2: Production
FROM node:18-alpine

WORKDIR /app

# Install serve for production
RUN npm install -g serve

# Copy built files from builder
COPY --from=builder /app/dist ./dist

# Expose port
EXPOSE 3000

# Run the application
CMD ["serve", "-s", "dist", "-l", "3000"]

version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agenticai-backend-prod
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      - REDIS_URL=redis://redis:6379
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - ENVIRONMENT=production
      - CORS_ORIGINS=${CORS_ORIGINS}
    depends_on:
      - db
      - redis
    networks:
      - agenticai-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agenticai-frontend-prod
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=${REACT_APP_API_URL}
      - REACT_APP_WEBSOCKET_URL=${REACT_APP_WEBSOCKET_URL}
      - REACT_APP_ENVIRONMENT=production
    depends_on:
      - backend
    networks:
      - agenticai-network
    restart: always

  db:
    image: postgres:15-alpine
    container_name: agenticai-db-prod
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - agenticai-network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agenticai-redis-prod
    volumes:
      - redis_data_prod:/data
    networks:
      - agenticai-network
    restart: always

  nginx:
    image: nginx:alpine
    container_name: agenticai-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./docker/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    networks:
      - agenticai-network
    restart: always
















