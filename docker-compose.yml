version: '3.8'

services:
  # ============ BACKEND SERVICE ============
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agenticai-backend
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/agenticai
      - REDIS_URL=redis://redis:6379
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - ENVIRONMENT=development
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173
    volumes:
      - ./backend:/app
      - /app/__pycache__
      - /app/.pytest_cache
    depends_on:
      - db
      - redis
    networks:
      - agenticai-network
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 5000 --reload

  # ============ FRONTEND SERVICE ============
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agenticai-frontend
    ports:
      - "3000:3000"
      - "5173:5173"
    environment:
      - REACT_APP_API_URL=http://localhost:5000/api
      - REACT_APP_WEBSOCKET_URL=ws://localhost:5000/ws
      - REACT_APP_ENVIRONMENT=development
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - agenticai-network
    restart: unless-stopped
    command: npm run dev -- --host 0.0.0.0

  # ============ DATABASE SERVICE ============
  db:
    image: postgres:15-alpine
    container_name: agenticai-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=agenticai
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/seed.sql
    networks:
      - agenticai-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============ REDIS SERVICE ============
  redis:
    image: redis:7-alpine
    container_name: agenticai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - agenticai-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  

 



















   















